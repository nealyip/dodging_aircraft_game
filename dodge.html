<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>彈幕避彈 — 飛機閃子彈</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #0a0a18;
    color: #e8e8f0;
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
  }
  #hud {
    display: flex;
    gap: 24px;
    font-size: 16px;
    letter-spacing: 1px;
  }
  #hud b { color: #5fd0ff; }
  #stage {
    position: relative;
    border: 2px solid #2a2a52;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(80,120,255,0.15), inset 0 0 60px rgba(0,0,0,0.6);
    background:
      radial-gradient(circle at 50% 40%, #14143a 0%, #0a0a1c 70%);
    touch-action: none;
    cursor: none;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: rgba(6,6,20,0.82);
    backdrop-filter: blur(2px);
    text-align: center;
    padding: 20px;
  }
  #overlay.hidden { display: none; }
  #overlay h1 { font-size: 30px; color: #5fd0ff; text-shadow: 0 0 18px rgba(95,208,255,0.6); }
  #overlay p { font-size: 14px; line-height: 1.7; color: #aab; max-width: 320px; }
  #overlay .big { font-size: 22px; color: #ffd86b; }
  button {
    font: inherit;
    font-size: 16px;
    padding: 10px 28px;
    border: none;
    border-radius: 24px;
    background: linear-gradient(135deg, #4f7bff, #6f3cff);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(80,90,255,0.4);
    transition: transform .08s;
  }
  button:active { transform: scale(0.95); }
  .hint { font-size: 12px; color: #667; }
  /* 手機虛擬搖桿（放喺遊戲範圍外，手指唔會擋住畫面）*/
  #padWrap { display: none; flex-direction: column; align-items: center; gap: 4px; margin-top: 2px; }
  #padWrap.show { display: flex; }
  #pad { touch-action: none; }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div>時間 <b id="time">0.0</b>s</div>
    <div>最佳 <b id="best">0.0</b>s</div>
    <div>子彈 <b id="count">0</b></div>
  </div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="overlay">
      <h1>彈幕避彈</h1>
      <p>操控飛機，閃避從四方八面射埋嚟嘅子彈。<br>撐得越耐越勁，難度會逐漸提升。</p>
      <p class="hint">電腦：WASD / 方向鍵 或 滑鼠　|　手機：用畫面下方嘅操控盤拖郁飛機</p>
      <button id="startBtn">開始遊戲</button>
      <p class="hint">或撳 Space / Enter 開始</p>
      <p class="hint" id="ver"></p>
    </div>
  </div>
  <div id="padWrap">
    <canvas id="pad"></canvas>
    <div class="hint">拖呢個盤控制飛機（手指唔會擋住畫面）</div>
  </div>
  <div class="hint">被任何子彈擊中即遊戲結束</div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const timeEl = document.getElementById('time');
const bestEl = document.getElementById('best');
const countEl = document.getElementById('count');
const padWrap = document.getElementById('padWrap');
const pad = document.getElementById('pad');
const pctx = pad.getContext('2d');

// ---- 版本 ----
const VERSION = '1.2.0';
document.getElementById('ver').textContent = 'v' + VERSION;

// ---- 觸控裝置偵測（決定要唔要顯示虛擬搖桿）----
const IS_TOUCH = matchMedia('(pointer: coarse)').matches || ('ontouchstart' in window);
if (IS_TOUCH) padWrap.classList.add('show');

// ---- 畫布尺寸（自適應）----
let W, H;
// 觸控裝置要喺畫面下面預留搖桿盤嘅空間
const PAD_SIZE = 130;        // 搖桿盤邊長（px）
function sizeStage() {
  const reserve = 140 + (IS_TOUCH ? PAD_SIZE + 50 : 0);
  const maxW = Math.min(window.innerWidth - 24, 520);
  const maxH = Math.min(window.innerHeight - reserve, 640);
  W = Math.floor(maxW);
  H = Math.floor(Math.max(220, maxH));
  const dpr = window.devicePixelRatio || 1;
  cv.width = W * dpr;
  cv.height = H * dpr;
  cv.style.width = W + 'px';
  cv.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
function sizePad() {
  const dpr = window.devicePixelRatio || 1;
  pad.width = PAD_SIZE * dpr;
  pad.height = PAD_SIZE * dpr;
  pad.style.width = PAD_SIZE + 'px';
  pad.style.height = PAD_SIZE + 'px';
  pctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  drawPad();
}
sizeStage();
// 注意：初次 sizePad() 喺檔案底部、joystick 定義之後先叫（drawPad 會用到 joystick）
window.addEventListener('resize', () => { sizeStage(); if (IS_TOUCH) sizePad(); });

// ---- 遊戲狀態 ----
const PLAYER_R = 7;          // 飛機判定半徑（細小，方便擦彈）
const player = { x: W/2, y: H*0.7, tx: W/2, ty: H*0.7 };
let bullets = [];
let running = false;
let startTime = 0;
let elapsed = 0;
let best = parseFloat(localStorage.getItem('dodge_best') || '0');
let spawnTimer = 0;
let lastFrame = 0;
let paused = false;
let pauseStart = 0;
bestEl.textContent = best.toFixed(1);

// ---- 輸入：滑鼠 / 觸控 ----
function setTarget(clientX, clientY) {
  const rect = cv.getBoundingClientRect();
  player.tx = Math.max(0, Math.min(W, clientX - rect.left));
  player.ty = Math.max(0, Math.min(H, clientY - rect.top));
}
cv.addEventListener('mousemove', e => { inputMode = 'pointer'; setTarget(e.clientX, e.clientY); });

// ---- 手機：虛擬搖桿（放喺遊戲範圍外嘅獨立操控盤）----
// 喺盤上面拖手指，飛機就 1:1 跟住你手指嘅位移郁，手指唔會擋住遊戲畫面
const JOY_GAIN = 1.0;        // 飛機位移 ÷ 手指位移（1.0 = 同手指郁一樣多；想快啲調大）
const joystick = { active:false, lastX:0, lastY:0, kx:0, ky:0 };  // kx,ky = 搖桿頭相對盤中心嘅偏移（純視覺）
function updateKnob(clientX, clientY) {
  const rect = pad.getBoundingClientRect();
  let kx = clientX - rect.left - PAD_SIZE/2;
  let ky = clientY - rect.top  - PAD_SIZE/2;
  const lim = PAD_SIZE/2 - 16, len = Math.hypot(kx, ky);
  if (len > lim) { kx = kx/len*lim; ky = ky/len*lim; }
  joystick.kx = kx; joystick.ky = ky;
}
function joyStart(t) {
  joystick.active = true;
  joystick.lastX = t.clientX; joystick.lastY = t.clientY;
  inputMode = 'joystick';
  updateKnob(t.clientX, t.clientY);
  drawPad();
}
function joyMove(t) {
  if (!joystick.active) return;
  // 1:1 相對拖動：手指郁幾多 px，飛機就郁幾多 px（乘 JOY_GAIN 微調）
  const dx = (t.clientX - joystick.lastX) * JOY_GAIN;
  const dy = (t.clientY - joystick.lastY) * JOY_GAIN;
  joystick.lastX = t.clientX; joystick.lastY = t.clientY;
  player.x = Math.max(0, Math.min(W, player.x + dx));
  player.y = Math.max(0, Math.min(H, player.y + dy));
  player.tx = player.x; player.ty = player.y;
  updateKnob(t.clientX, t.clientY);
  drawPad();
}
function joyEnd() { joystick.active = false; joystick.kx = 0; joystick.ky = 0; drawPad(); }
pad.addEventListener('touchstart',  e => { e.preventDefault(); joyStart(e.touches[0]); }, {passive:false});
pad.addEventListener('touchmove',   e => { e.preventDefault(); joyMove(e.touches[0]); }, {passive:false});
pad.addEventListener('touchend',    e => { e.preventDefault(); joyEnd(); }, {passive:false});
pad.addEventListener('touchcancel', e => { e.preventDefault(); joyEnd(); }, {passive:false});

// ---- 搖桿盤繪圖（十字方向 + 搖桿頭）----
function drawPad() {
  const c = PAD_SIZE/2, R = PAD_SIZE/2 - 4;
  pctx.clearRect(0, 0, PAD_SIZE, PAD_SIZE);
  // 底盤
  pctx.fillStyle = 'rgba(20,20,52,0.6)';
  pctx.strokeStyle = 'rgba(95,208,255,0.35)';
  pctx.lineWidth = 2;
  pctx.beginPath(); pctx.arc(c, c, R, 0, Math.PI*2); pctx.fill(); pctx.stroke();
  // 十字方向箭嘴（上下左右）
  pctx.fillStyle = 'rgba(191,234,255,0.55)';
  const off = R - 12;
  padArrow(c, c - off, 0);            // 上
  padArrow(c, c + off, Math.PI);      // 下
  padArrow(c - off, c, -Math.PI/2);   // 左
  padArrow(c + off, c, Math.PI/2);    // 右
  // 搖桿頭
  const kx = c + joystick.kx, ky = c + joystick.ky;
  const g = pctx.createRadialGradient(kx, ky, 0, kx, ky, 18);
  g.addColorStop(0, joystick.active ? 'rgba(95,208,255,0.95)' : 'rgba(95,208,255,0.55)');
  g.addColorStop(1, 'rgba(95,208,255,0.12)');
  pctx.fillStyle = g;
  pctx.beginPath(); pctx.arc(kx, ky, 16, 0, Math.PI*2); pctx.fill();
}
function padArrow(px, py, rot) {
  const a = 8;
  pctx.save();
  pctx.translate(px, py); pctx.rotate(rot);
  pctx.beginPath();
  pctx.moveTo(0, -a); pctx.lineTo(a*0.8, a*0.6); pctx.lineTo(-a*0.8, a*0.6);
  pctx.closePath(); pctx.fill();
  pctx.restore();
}

// ---- 鍵盤：WASD / 方向鍵 ----
let inputMode = 'pointer';          // 'pointer' 跟滑鼠/觸控；'keyboard' 跟鍵盤
const keys = Object.create(null);
const KEY_SPEED = 320;              // 鍵盤移動速度（px/秒）
const MOVE_KEYS = {
  'w':'up','arrowup':'up', 's':'down','arrowdown':'down',
  'a':'left','arrowleft':'left', 'd':'right','arrowright':'right'
};
window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k in MOVE_KEYS) {
    e.preventDefault();
    keys[MOVE_KEYS[k]] = true;
    inputMode = 'keyboard';
  }
});
window.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if (k in MOVE_KEYS) { e.preventDefault(); keys[MOVE_KEYS[k]] = false; }
});
// Space / Enter：開始或重新開始（遊戲未進行時）
window.addEventListener('keydown', e => {
  if ((e.code === 'Space' || e.key === 'Enter') && !running) {
    e.preventDefault();
    start();
  }
});

// ---- 子彈生成 ----
function spawnBullet() {
  // 從畫面四邊外圍隨機位置生成，瞄向當前玩家位置（帶少少散射）
  const margin = 20;
  const side = Math.floor(Math.random() * 4);
  let x, y;
  if (side === 0) { x = Math.random()*W; y = -margin; }
  else if (side === 1) { x = W+margin; y = Math.random()*H; }
  else if (side === 2) { x = Math.random()*W; y = H+margin; }
  else { x = -margin; y = Math.random()*H; }

  // 速度隨時間增加（前期慢，方便閃避）
  const t = elapsed;
  const speed = 70 + Math.min(150, t * 4) + Math.random()*30;
  // 瞄準玩家，加上散射偏差
  let ang = Math.atan2(player.y - y, player.x - x);
  ang += (Math.random() - 0.5) * 0.5;
  bullets.push({
    x, y,
    vx: Math.cos(ang) * speed,
    vy: Math.sin(ang) * speed,
    r: 5 + Math.random()*3,
    hue: 180 + Math.random()*120
  });
}

// 偶爾來個環形彈幕，增加「四方八面」感覺
function spawnRing() {
  const cx = Math.random()*W, cy = Math.random()*H;
  // 數量隨時間增加：起初約 10 粒，慢慢加到上限 ~22
  const n = Math.min(22, 10 + Math.floor((elapsed - 18) / 5));
  const speed = 60 + Math.min(110, elapsed*3);
  const base = Math.random()*Math.PI*2;
  for (let i = 0; i < n; i++) {
    const ang = base + (i/n) * Math.PI*2;
    bullets.push({
      x: cx, y: cy,
      vx: Math.cos(ang)*speed,
      vy: Math.sin(ang)*speed,
      r: 5,
      hue: 20 + Math.random()*40
    });
  }
}

// ---- 遊戲流程 ----
function reset() {
  bullets = [];
  player.x = player.tx = W/2;
  player.y = player.ty = H*0.7;
  elapsed = 0;
  spawnTimer = 0;
  ringTimer = 0;
}
let ringTimer = 0;

function start() {
  sizeStage();
  reset();
  overlay.classList.add('hidden');
  running = true;
  paused = false;
  startTime = performance.now();
  lastFrame = startTime;
  requestAnimationFrame(loop);
}

// ---- 離開畫面（切換分頁／縮到背景）時暫停，防止計時跳到 300s ----
function pauseGame() {
  if (!running || paused) return;
  paused = true;
  pauseStart = performance.now();
}
function resumeGame() {
  if (!running || !paused) return;
  paused = false;
  // 把暫停期間嘅時間補返去 startTime，令 elapsed 唔會跳
  const gap = performance.now() - pauseStart;
  startTime += gap;
  lastFrame = performance.now();
  requestAnimationFrame(loop);
}
document.addEventListener('visibilitychange', () => {
  if (document.hidden) pauseGame();
  else resumeGame();
});
window.addEventListener('blur', pauseGame);
window.addEventListener('focus', resumeGame);

function gameOver() {
  running = false;
  if (elapsed > best) {
    best = elapsed;
    localStorage.setItem('dodge_best', best.toFixed(2));
    bestEl.textContent = best.toFixed(1);
  }
  overlay.innerHTML =
    '<h1>遊戲結束</h1>' +
    '<p class="big">撐咗 ' + elapsed.toFixed(1) + ' 秒</p>' +
    '<p>最佳紀錄：' + best.toFixed(1) + ' 秒</p>' +
    '<button id="againBtn">再玩一次</button>' +
    '<p class="hint">或撳 Space / Enter 再玩</p>';
  overlay.classList.remove('hidden');
  document.getElementById('againBtn').addEventListener('click', start);
}

// ---- 主迴圈 ----
function loop(now) {
  if (!running || paused) return;
  const dt = Math.min(0.05, (now - lastFrame) / 1000);
  lastFrame = now;
  elapsed = (now - startTime) / 1000;

  // 玩家移動：鍵盤直接控制，否則平滑跟隨滑鼠/觸控目標
  if (inputMode === 'keyboard') {
    let dx = (keys.right ? 1 : 0) - (keys.left ? 1 : 0);
    let dy = (keys.down ? 1 : 0) - (keys.up ? 1 : 0);
    if (dx && dy) { const inv = 1/Math.SQRT2; dx *= inv; dy *= inv; }  // 斜向唔加速
    player.x = Math.max(0, Math.min(W, player.x + dx * KEY_SPEED * dt));
    player.y = Math.max(0, Math.min(H, player.y + dy * KEY_SPEED * dt));
    player.tx = player.x; player.ty = player.y;
  } else if (inputMode === 'joystick') {
    // 1:1 拖動嘅實際位移喺 touchmove 已即時套用，呢度唔需要再郁
    player.tx = player.x; player.ty = player.y;
  } else {
    player.x += (player.tx - player.x) * Math.min(1, dt * 18);
    player.y += (player.ty - player.y) * Math.min(1, dt * 18);
  }

  // 漸進式難度：一開始好疏（約 1 粒/秒），越打越密，目標一般人捱到 ~30s
  // 生成間隔由 1.1s 線性收窄到 0.18s（約 30s 到頂）；改下面三個數就可調手感
  const interval = Math.max(0.18, 1.1 - elapsed * 0.031);
  spawnTimer += dt;
  while (spawnTimer >= interval) {
    spawnTimer -= interval;
    spawnBullet();
  }
  // 環形彈幕：18s 後先出現，之後每 7s 一次（前期唔好咁快爆滿）
  ringTimer += dt;
  if (elapsed > 18 && ringTimer > 7) { ringTimer = 0; spawnRing(); }

  // 更新子彈
  const margin = 40;
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.x < -margin || b.x > W+margin || b.y < -margin || b.y > H+margin) {
      bullets.splice(i, 1);
      continue;
    }
    // 碰撞檢測
    const dx = b.x - player.x, dy = b.y - player.y;
    if (dx*dx + dy*dy < (b.r + PLAYER_R) * (b.r + PLAYER_R)) {
      draw();
      flashHit();
      gameOver();
      return;
    }
  }

  draw();
  timeEl.textContent = elapsed.toFixed(1);
  countEl.textContent = bullets.length;
  requestAnimationFrame(loop);
}

// ---- 繪圖 ----
function draw() {
  ctx.clearRect(0, 0, W, H);

  // 背景星點
  ctx.save();
  ctx.globalAlpha = 0.5;
  for (let i = 0; i < 40; i++) {
    const sx = (i * 97.13) % W;
    const sy = (i * 53.7 + elapsed*20) % H;
    ctx.fillStyle = '#2a2a55';
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.restore();

  // 子彈
  for (const b of bullets) {
    const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r*2.2);
    g.addColorStop(0, `hsla(${b.hue},100%,80%,0.95)`);
    g.addColorStop(0.4, `hsla(${b.hue},100%,60%,0.85)`);
    g.addColorStop(1, `hsla(${b.hue},100%,50%,0)`);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r*2.2, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r*0.5, 0, Math.PI*2);
    ctx.fill();
  }

  // 玩家飛機
  drawPlane(player.x, player.y);
}

function drawPlane(x, y) {
  ctx.save();
  ctx.translate(x, y);
  // 機身
  ctx.fillStyle = '#5fd0ff';
  ctx.strokeStyle = '#bfeaff';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, -12);
  ctx.lineTo(9, 8);
  ctx.lineTo(0, 3);
  ctx.lineTo(-9, 8);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // 引擎火焰
  ctx.fillStyle = 'rgba(255,180,80,0.9)';
  ctx.beginPath();
  ctx.moveTo(-3, 6);
  ctx.lineTo(0, 13 + Math.sin(elapsed*40)*3);
  ctx.lineTo(3, 6);
  ctx.closePath();
  ctx.fill();
  // 判定核心（細紅點，提示真正受擊範圍）
  ctx.fillStyle = '#ff3b5c';
  ctx.beginPath();
  ctx.arc(0, 0, 2.5, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function flashHit() {
  ctx.fillStyle = 'rgba(255,60,90,0.35)';
  ctx.fillRect(0, 0, W, H);
}

startBtn.addEventListener('click', start);

// 初次畫一格畫面
draw();
if (IS_TOUCH) sizePad();   // 此時 joystick 已定義，drawPad 先用得
</script>
</body>
</html>
