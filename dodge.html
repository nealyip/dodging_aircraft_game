<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>彈幕避彈 — 飛機閃子彈</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #0a0a18;
    color: #e8e8f0;
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
  }
  #hud {
    display: flex;
    gap: 24px;
    font-size: 16px;
    letter-spacing: 1px;
  }
  #hud b { color: #5fd0ff; }
  #stage {
    position: relative;
    border: 2px solid #2a2a52;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(80,120,255,0.15), inset 0 0 60px rgba(0,0,0,0.6);
    background:
      radial-gradient(circle at 50% 40%, #14143a 0%, #0a0a1c 70%);
    touch-action: none;
    cursor: none;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: rgba(6,6,20,0.82);
    backdrop-filter: blur(2px);
    text-align: center;
    padding: 20px;
  }
  #overlay.hidden { display: none; }
  #overlay h1 { font-size: 30px; color: #5fd0ff; text-shadow: 0 0 18px rgba(95,208,255,0.6); }
  #overlay p { font-size: 14px; line-height: 1.7; color: #aab; max-width: 320px; }
  #overlay .big { font-size: 22px; color: #ffd86b; }
  button {
    font: inherit;
    font-size: 16px;
    padding: 10px 28px;
    border: none;
    border-radius: 24px;
    background: linear-gradient(135deg, #4f7bff, #6f3cff);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(80,90,255,0.4);
    transition: transform .08s;
  }
  button:active { transform: scale(0.95); }
  .hint { font-size: 12px; color: #667; }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div>時間 <b id="time">0.0</b>s</div>
    <div>最佳 <b id="best">0.0</b>s</div>
    <div>子彈 <b id="count">0</b></div>
  </div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="overlay">
      <h1>彈幕避彈</h1>
      <p>操控飛機，閃避從四方八面射埋嚟嘅子彈。<br>撐得越耐越勁，難度會逐漸提升。</p>
      <p class="hint">電腦：WASD / 方向鍵 或 滑鼠　|　手機：篤住畫面，手指上下左右拉郁飛機</p>
      <button id="startBtn">開始遊戲</button>
      <p class="hint">或撳 Space / Enter 開始</p>
    </div>
  </div>
  <div class="hint">被任何子彈擊中即遊戲結束</div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const timeEl = document.getElementById('time');
const bestEl = document.getElementById('best');
const countEl = document.getElementById('count');

// ---- 畫布尺寸（自適應）----
let W, H;
function sizeStage() {
  const maxW = Math.min(window.innerWidth - 24, 520);
  const maxH = Math.min(window.innerHeight - 140, 640);
  W = Math.floor(maxW);
  H = Math.floor(maxH);
  const dpr = window.devicePixelRatio || 1;
  cv.width = W * dpr;
  cv.height = H * dpr;
  cv.style.width = W + 'px';
  cv.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
sizeStage();
window.addEventListener('resize', () => { sizeStage(); });

// ---- 遊戲狀態 ----
const PLAYER_R = 7;          // 飛機判定半徑（細小，方便擦彈）
const player = { x: W/2, y: H*0.7, tx: W/2, ty: H*0.7 };
let bullets = [];
let running = false;
let startTime = 0;
let elapsed = 0;
let best = parseFloat(localStorage.getItem('dodge_best') || '0');
let spawnTimer = 0;
let lastFrame = 0;
let paused = false;
let pauseStart = 0;
bestEl.textContent = best.toFixed(1);

// ---- 輸入：滑鼠 / 觸控 ----
function setTarget(clientX, clientY) {
  const rect = cv.getBoundingClientRect();
  player.tx = Math.max(0, Math.min(W, clientX - rect.left));
  player.ty = Math.max(0, Math.min(H, clientY - rect.top));
}
cv.addEventListener('mousemove', e => { inputMode = 'pointer'; setTarget(e.clientX, e.clientY); });

// ---- 手機：虛擬搖桿（十字方向，相對拖動）----
// 一篤落去嗰點就係中心，手指上下左右拉，飛機就同方向郁，唔會即刻飛去手指位
const JOY_R = 42;            // 搖桿視覺半徑（px）
const JOY_GAIN = 1.0;        // 飛機位移 ÷ 手指位移（1.0 = 同手指郁一樣多；想快啲調大）
const joystick = { active:false, lastX:0, lastY:0, fx:0, fy:0 };
function canvasPos(clientX, clientY) {
  const rect = cv.getBoundingClientRect();
  return { x: clientX - rect.left, y: clientY - rect.top };
}
function joyStart(t) {
  const p = canvasPos(t.clientX, t.clientY);
  joystick.active = true;
  joystick.lastX = p.x; joystick.lastY = p.y;
  joystick.fx = p.x;    joystick.fy = p.y;
  inputMode = 'joystick';
}
function joyMove(t) {
  if (!joystick.active) return;
  const p = canvasPos(t.clientX, t.clientY);
  // 1:1 相對拖動：手指郁幾多，飛機就郁幾多（乘 JOY_GAIN 微調）
  const dx = (p.x - joystick.lastX) * JOY_GAIN;
  const dy = (p.y - joystick.lastY) * JOY_GAIN;
  joystick.lastX = p.x; joystick.lastY = p.y;
  joystick.fx = p.x;    joystick.fy = p.y;
  player.x = Math.max(0, Math.min(W, player.x + dx));
  player.y = Math.max(0, Math.min(H, player.y + dy));
  player.tx = player.x; player.ty = player.y;
}
function joyEnd() { joystick.active = false; }
cv.addEventListener('touchstart',  e => { e.preventDefault(); joyStart(e.touches[0]); }, {passive:false});
cv.addEventListener('touchmove',   e => { e.preventDefault(); joyMove(e.touches[0]); }, {passive:false});
cv.addEventListener('touchend',    e => { e.preventDefault(); joyEnd(); }, {passive:false});
cv.addEventListener('touchcancel', e => { e.preventDefault(); joyEnd(); }, {passive:false});

// ---- 鍵盤：WASD / 方向鍵 ----
let inputMode = 'pointer';          // 'pointer' 跟滑鼠/觸控；'keyboard' 跟鍵盤
const keys = Object.create(null);
const KEY_SPEED = 320;              // 鍵盤移動速度（px/秒）
const MOVE_KEYS = {
  'w':'up','arrowup':'up', 's':'down','arrowdown':'down',
  'a':'left','arrowleft':'left', 'd':'right','arrowright':'right'
};
window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k in MOVE_KEYS) {
    e.preventDefault();
    keys[MOVE_KEYS[k]] = true;
    inputMode = 'keyboard';
  }
});
window.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if (k in MOVE_KEYS) { e.preventDefault(); keys[MOVE_KEYS[k]] = false; }
});
// Space / Enter：開始或重新開始（遊戲未進行時）
window.addEventListener('keydown', e => {
  if ((e.code === 'Space' || e.key === 'Enter') && !running) {
    e.preventDefault();
    start();
  }
});

// ---- 子彈生成 ----
function spawnBullet() {
  // 從畫面四邊外圍隨機位置生成，瞄向當前玩家位置（帶少少散射）
  const margin = 20;
  const side = Math.floor(Math.random() * 4);
  let x, y;
  if (side === 0) { x = Math.random()*W; y = -margin; }
  else if (side === 1) { x = W+margin; y = Math.random()*H; }
  else if (side === 2) { x = Math.random()*W; y = H+margin; }
  else { x = -margin; y = Math.random()*H; }

  // 速度隨時間增加
  const t = elapsed;
  const speed = 90 + Math.min(160, t * 5) + Math.random()*40;
  // 瞄準玩家，加上散射偏差
  let ang = Math.atan2(player.y - y, player.x - x);
  ang += (Math.random() - 0.5) * 0.5;
  bullets.push({
    x, y,
    vx: Math.cos(ang) * speed,
    vy: Math.sin(ang) * speed,
    r: 5 + Math.random()*3,
    hue: 180 + Math.random()*120
  });
}

// 偶爾來個環形彈幕，增加「四方八面」感覺
function spawnRing() {
  const cx = Math.random()*W, cy = Math.random()*H;
  const n = 14 + Math.floor(Math.random()*8);
  const speed = 70 + Math.min(120, elapsed*4);
  const base = Math.random()*Math.PI*2;
  for (let i = 0; i < n; i++) {
    const ang = base + (i/n) * Math.PI*2;
    bullets.push({
      x: cx, y: cy,
      vx: Math.cos(ang)*speed,
      vy: Math.sin(ang)*speed,
      r: 5,
      hue: 20 + Math.random()*40
    });
  }
}

// ---- 遊戲流程 ----
function reset() {
  bullets = [];
  player.x = player.tx = W/2;
  player.y = player.ty = H*0.7;
  elapsed = 0;
  spawnTimer = 0;
  ringTimer = 0;
}
let ringTimer = 0;

function start() {
  sizeStage();
  reset();
  overlay.classList.add('hidden');
  running = true;
  paused = false;
  startTime = performance.now();
  lastFrame = startTime;
  requestAnimationFrame(loop);
}

// ---- 離開畫面（切換分頁／縮到背景）時暫停，防止計時跳到 300s ----
function pauseGame() {
  if (!running || paused) return;
  paused = true;
  pauseStart = performance.now();
}
function resumeGame() {
  if (!running || !paused) return;
  paused = false;
  // 把暫停期間嘅時間補返去 startTime，令 elapsed 唔會跳
  const gap = performance.now() - pauseStart;
  startTime += gap;
  lastFrame = performance.now();
  requestAnimationFrame(loop);
}
document.addEventListener('visibilitychange', () => {
  if (document.hidden) pauseGame();
  else resumeGame();
});
window.addEventListener('blur', pauseGame);
window.addEventListener('focus', resumeGame);

function gameOver() {
  running = false;
  if (elapsed > best) {
    best = elapsed;
    localStorage.setItem('dodge_best', best.toFixed(2));
    bestEl.textContent = best.toFixed(1);
  }
  overlay.innerHTML =
    '<h1>遊戲結束</h1>' +
    '<p class="big">撐咗 ' + elapsed.toFixed(1) + ' 秒</p>' +
    '<p>最佳紀錄：' + best.toFixed(1) + ' 秒</p>' +
    '<button id="againBtn">再玩一次</button>' +
    '<p class="hint">或撳 Space / Enter 再玩</p>';
  overlay.classList.remove('hidden');
  document.getElementById('againBtn').addEventListener('click', start);
}

// ---- 主迴圈 ----
function loop(now) {
  if (!running || paused) return;
  const dt = Math.min(0.05, (now - lastFrame) / 1000);
  lastFrame = now;
  elapsed = (now - startTime) / 1000;

  // 玩家移動：鍵盤直接控制，否則平滑跟隨滑鼠/觸控目標
  if (inputMode === 'keyboard') {
    let dx = (keys.right ? 1 : 0) - (keys.left ? 1 : 0);
    let dy = (keys.down ? 1 : 0) - (keys.up ? 1 : 0);
    if (dx && dy) { const inv = 1/Math.SQRT2; dx *= inv; dy *= inv; }  // 斜向唔加速
    player.x = Math.max(0, Math.min(W, player.x + dx * KEY_SPEED * dt));
    player.y = Math.max(0, Math.min(H, player.y + dy * KEY_SPEED * dt));
    player.tx = player.x; player.ty = player.y;
  } else if (inputMode === 'joystick') {
    // 1:1 拖動嘅實際位移喺 touchmove 已即時套用，呢度唔需要再郁
    player.tx = player.x; player.ty = player.y;
  } else {
    player.x += (player.tx - player.x) * Math.min(1, dt * 18);
    player.y += (player.ty - player.y) * Math.min(1, dt * 18);
  }

  // 生成節奏：隨時間越來越密
  const interval = Math.max(0.08, 0.45 - elapsed * 0.012);
  spawnTimer += dt;
  while (spawnTimer >= interval) {
    spawnTimer -= interval;
    spawnBullet();
  }
  ringTimer += dt;
  if (elapsed > 8 && ringTimer > 3.5) { ringTimer = 0; spawnRing(); }

  // 更新子彈
  const pad = 40;
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.x < -pad || b.x > W+pad || b.y < -pad || b.y > H+pad) {
      bullets.splice(i, 1);
      continue;
    }
    // 碰撞檢測
    const dx = b.x - player.x, dy = b.y - player.y;
    if (dx*dx + dy*dy < (b.r + PLAYER_R) * (b.r + PLAYER_R)) {
      draw();
      flashHit();
      gameOver();
      return;
    }
  }

  draw();
  timeEl.textContent = elapsed.toFixed(1);
  countEl.textContent = bullets.length;
  requestAnimationFrame(loop);
}

// ---- 繪圖 ----
function draw() {
  ctx.clearRect(0, 0, W, H);

  // 背景星點
  ctx.save();
  ctx.globalAlpha = 0.5;
  for (let i = 0; i < 40; i++) {
    const sx = (i * 97.13) % W;
    const sy = (i * 53.7 + elapsed*20) % H;
    ctx.fillStyle = '#2a2a55';
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.restore();

  // 子彈
  for (const b of bullets) {
    const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r*2.2);
    g.addColorStop(0, `hsla(${b.hue},100%,80%,0.95)`);
    g.addColorStop(0.4, `hsla(${b.hue},100%,60%,0.85)`);
    g.addColorStop(1, `hsla(${b.hue},100%,50%,0)`);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r*2.2, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r*0.5, 0, Math.PI*2);
    ctx.fill();
  }

  // 玩家飛機
  drawPlane(player.x, player.y);

  // 手機虛擬搖桿
  if (inputMode === 'joystick' && joystick.active) drawJoystick();
}

// ---- 虛擬搖桿繪圖（十字方向 + 搖桿頭）----
function drawJoystick() {
  const { fx, fy } = joystick;
  ctx.save();
  ctx.globalAlpha = 0.8;
  // 外圈
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(95,208,255,0.35)';
  ctx.beginPath();
  ctx.arc(fx, fy, JOY_R, 0, Math.PI*2);
  ctx.stroke();
  // 十字方向箭嘴（上下左右）
  ctx.fillStyle = 'rgba(191,234,255,0.6)';
  const off = JOY_R - 4;
  drawArrow(fx, fy - off, 0);            // 上
  drawArrow(fx, fy + off, Math.PI);      // 下
  drawArrow(fx - off, fy, -Math.PI/2);   // 左
  drawArrow(fx + off, fy, Math.PI/2);    // 右
  // 中心點（手指位置）
  ctx.fillStyle = 'rgba(95,208,255,0.55)';
  ctx.beginPath();
  ctx.arc(fx, fy, 5, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawArrow(px, py, rot) {
  const a = 9;
  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(rot);
  ctx.beginPath();
  ctx.moveTo(0, -a);
  ctx.lineTo(a*0.8, a*0.6);
  ctx.lineTo(-a*0.8, a*0.6);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawPlane(x, y) {
  ctx.save();
  ctx.translate(x, y);
  // 機身
  ctx.fillStyle = '#5fd0ff';
  ctx.strokeStyle = '#bfeaff';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, -12);
  ctx.lineTo(9, 8);
  ctx.lineTo(0, 3);
  ctx.lineTo(-9, 8);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // 引擎火焰
  ctx.fillStyle = 'rgba(255,180,80,0.9)';
  ctx.beginPath();
  ctx.moveTo(-3, 6);
  ctx.lineTo(0, 13 + Math.sin(elapsed*40)*3);
  ctx.lineTo(3, 6);
  ctx.closePath();
  ctx.fill();
  // 判定核心（細紅點，提示真正受擊範圍）
  ctx.fillStyle = '#ff3b5c';
  ctx.beginPath();
  ctx.arc(0, 0, 2.5, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function flashHit() {
  ctx.fillStyle = 'rgba(255,60,90,0.35)';
  ctx.fillRect(0, 0, W, H);
}

startBtn.addEventListener('click', start);

// 初次畫一格畫面
draw();
</script>
</body>
</html>
